# NVIDIA GPU — GTX 900+ / RTX series
#
# Host prerequisites:
#   1. NVIDIA drivers installed on the host
#   2. nvidia-container-toolkit:
#        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
#          | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
#        curl -sL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
#          | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
#          | sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
#        sudo apt-get update && sudo apt-get install -y nvidia-container-toolkit
#        sudo nvidia-ctk runtime configure --runtime=docker && sudo systemctl restart docker
#
# LIBVA_DRIVER_NAME=auto will detect /dev/nvidia0 and skip VAAPI entirely.
# NVENC/NVDEC are exposed automatically by the nvidia runtime.
services:
  jellyfin:
    image: ghcr.io/argyle-labs/jellyfin:latest
    container_name: jellyfin
    network_mode: host
    restart: unless-stopped
    shm_size: 4g
    runtime: nvidia
    environment:
      JELLYFIN_UID: "1000"
      JELLYFIN_GID: "1000"
      LIBVA_DRIVER_NAME: auto
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/jellyfin/config:/config
      - /opt/jellyfin/cache:/cache
      - /mnt/media:/mnt/media:ro
