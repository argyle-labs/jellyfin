# Jellyfin — official upstream image (jellyfin/jellyfin).
#
# Identical shape and options to docker-compose.yml; you are NOT tied to our
# build. LinuxServer.io's `lscr.io/linuxserver/jellyfin` also drops in (it uses
# PUID/PGID and a /config layout). Same GPU/transcode options apply — see the
# comments in docker-compose.yml.

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    network_mode: host          # Jellyfin serves on :8096 (http://<host>:8096)
    restart: unless-stopped
    shm_size: 4g
    environment:
      TZ: Etc/UTC
      PUID: "1000"
      PGID: "1000"
      # ── NVIDIA option ── uncomment these + `runtime: nvidia`, remove `devices:`:
      # NVIDIA_VISIBLE_DEVICES: all
      # NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    # runtime: nvidia            # NVIDIA option — needs nvidia-container-toolkit
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/jellyfin/config:/config
      - /opt/jellyfin/cache:/cache        # disk transcode scratch (default)
      - /mnt/media:/mnt/media:ro
    devices:                     # Intel/AMD GPU — omit on an NVIDIA-only host
      - /dev/dri/renderD128
      - /dev/dri/card0
    # ── tmpfs (RAM) transcode option ── replace the /cache volume above:
    # tmpfs:
    #   - /cache:size=4g,mode=1777
