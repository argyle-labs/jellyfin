services:
  jellyfin:
    image: ghcr.io/scottdkey/jellyfin:latest
    container_name: jellyfin
    network_mode: host
    restart: unless-stopped
    shm_size: 4g
    environment:
      JELLYFIN_UID: "1000"
      JELLYFIN_GID: "1000"
      LIBVA_DRIVER_NAME: auto
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/jellyfin/config:/config
      - /opt/jellyfin/cache:/cache
      - /mnt/media:/mnt/media:ro
    devices:
      - /dev/dri/renderD128
      - /dev/dri/card0
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:8096/System/Info/Public"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
