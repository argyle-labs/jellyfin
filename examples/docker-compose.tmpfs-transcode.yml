services:
  jellyfin:
    image: ghcr.io/argyle-labs/jellyfin:latest
    container_name: jellyfin
    network_mode: host
    restart: unless-stopped
    shm_size: 8g
    environment:
      JELLYFIN_UID: "1000"
      JELLYFIN_GID: "1000"
      LIBVA_DRIVER_NAME: auto
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/jellyfin/config:/config
      - /mnt/media:/mnt/media:ro
    tmpfs:
      # Jellyfin writes transcode segments under /cache/transcodes — RAM-back it.
      - /cache:size=4g,mode=1777
    devices:
      - /dev/dri/renderD128
      - /dev/dri/card0
