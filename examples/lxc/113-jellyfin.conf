arch: amd64
cores: 2
dev0: /dev/dri/card0,gid=44
dev1: /dev/dri/renderD128,gid=44
hostname: jellyfin
memory: 4096
mp0: /mnt/<share>/backups/jellyfin,mp=/mnt/backups
mp1: /mnt/<share>/data,mp=/mnt/data
net0: name=eth0,bridge=vmbr0,hwaddr=<mac>,ip=dhcp,type=veth
onboot: 1
ostype: debian
rootfs: local-lvm:vm-113-disk-0,size=16G
swap: 1024
